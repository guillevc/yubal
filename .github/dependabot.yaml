version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/packages/yubal"
    schedule:
      interval: "daily"
    allow:
      - dependency-name: "yt-dlp"
    commit-message:
      prefix: "chore"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
