# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: extension-ci
permissions:
  contents: read

on:
  push:
    branches: [master, next]
    paths: ["extension/**"]
  pull_request:
    branches: [master, next]
    paths: ["extension/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4
        with:
          version: 2026.1.3
          working_directory: extension

      - uses: actions/cache@v5
        with:
          path: extension/node_modules
          key: ext-bun-${{ runner.os }}-${{ hashFiles('extension/bun.lock') }}
          restore-keys: ext-bun-${{ runner.os }}-

      - run: just install
        working-directory: extension
      - run: just check
        working-directory: extension
      - run: just build
        working-directory: extension
