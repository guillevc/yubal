# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: extension-release

on:
  push:
    tags: ["ext-v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
        with:
          version: 2026.1.3
          working_directory: extension
      - run: just install
        working-directory: extension
      - run: just zip
        working-directory: extension
      - run: just zip-firefox
        working-directory: extension
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#ext-}" >> "$GITHUB_OUTPUT"
      - name: Find previous extension tag
        id: prev-tag
        run: |
          prev=$(git tag --list 'ext-v*' --sort=-version:refname | grep -v "^$GITHUB_REF_NAME$" | head -1)
          echo "tag=${prev:-none}" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        run: |
          git cliff --config extension/cliff.toml --tag "$GITHUB_REF_NAME" --latest --strip all
          prev="${{ steps.prev-tag.outputs.tag }}"
          if [ "$prev" != "none" ]; then
            echo "" >> CHANGES.md
            echo "**Full diff**: [\`${prev}...${GITHUB_REF_NAME}\`](https://github.com/${{ github.repository }}/compare/${prev}...${GITHUB_REF_NAME})" >> CHANGES.md
          fi
        env:
          GIT_CLIFF_OUTPUT: CHANGES.md
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Extension ${{ steps.version.outputs.version }}"
          body_path: CHANGES.md
          files: extension/.output/*.zip
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: extension/.output/*.zip
